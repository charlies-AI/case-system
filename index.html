<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個案管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e5e5e5;padding:12px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:600}
.nav-btn{padding:6px 14px;border:1px solid #ddd;border-radius:8px;background:none;cursor:pointer;font-size:13px;color:#555}
.nav-btn.active,.nav-btn:hover{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.container{max-width:1200px;margin:0 auto;padding:16px}
.progress-bar-wrap{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:14px 20px;margin-bottom:14px}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.progress-title{font-size:14px;font-weight:600}
.progress-nums{font-size:13px;color:#888}
.progress-nums span{color:#1a1a1a;font-weight:600}
.bar-bg{background:#f0f0f0;border-radius:20px;height:10px;overflow:hidden}
.bar-fill{background:#e24b4a;border-radius:20px;height:10px;transition:width 0.3s}
.sub-stats{display:flex;gap:20px;margin-top:8px;font-size:12px;color:#888;flex-wrap:wrap}
.sub-stats b{color:#1a1a1a}
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.month-ctrl{display:flex;align-items:center;gap:6px}
.month-ctrl button{padding:5px 10px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px}
.month-ctrl button:hover{background:#f0f0f0}
.month-label{font-size:15px;font-weight:600;min-width:70px;text-align:center}
.add-btn{padding:7px 16px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;margin-left:auto}
.add-btn:hover{opacity:0.85}
.search-box{padding:6px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;width:160px}
.layout{display:flex;gap:14px;align-items:flex-start}
.tbl-wrap{flex:1;background:#fff;border-radius:12px;border:1px solid #e5e5e5;overflow:hidden;overflow-x:auto;min-width:0}
table{width:100%;border-collapse:collapse;min-width:500px}
thead tr{background:#fafafa}
th{padding:9px 10px;font-size:12px;font-weight:500;color:#888;border-bottom:1px solid #e5e5e5;text-align:left;white-space:nowrap}
th.center{text-align:center}
td{padding:0;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.selected td{background:#f0f7ff}
tr:hover td{background:#fafafa}
tr.selected:hover td{background:#e8f3ff}
.num-cell{width:40px;text-align:center;font-size:12px;color:#aaa;padding:0 6px;cursor:pointer}
.note-cell{width:180px}
.name-cell{width:100px;cursor:pointer}
.check-cell{width:130px;text-align:center}
.visit-cell{width:66px}
.del-cell{width:36px}
.cell-input{width:100%;height:52px;padding:4px 8px;border:none;background:transparent;font-size:13px;color:#1a1a1a;font-family:inherit;outline:none}
.cell-input::placeholder{color:#ddd}
.cell-input:focus{background:#f8f8f8}
.note-wrap{display:flex;align-items:center;gap:4px;padding:0 6px;height:52px}
.note-input{flex:1;height:44px;padding:4px 4px;border:none;background:transparent;font-size:13px;color:#1a1a1a;font-family:inherit;outline:none;resize:none;overflow:hidden}
.note-input::placeholder{color:#ddd}
.note-input:focus{background:#f8f8f8;border-radius:6px}
.urgent-btn{width:26px;height:26px;border-radius:50%;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;color:#ccc;font-weight:700}
.urgent-btn.on{background:#e24b4a;border-color:#e24b4a;color:#fff}
.done-cell{background:#e24b4a}
.done-cell .cell-input{color:#fff;font-weight:600;text-align:center;background:transparent}
.visit-input{text-align:center}
.del-btn{width:100%;height:52px;background:none;border:none;cursor:pointer;color:#ddd;font-size:16px}
.del-btn:hover{color:#a32d2d}
.check-btn{width:36px;height:36px;border-radius:50%;border:2px solid #ddd;background:#fff;cursor:pointer;font-size:16px;display:inline-flex;align-items:center;justify-content:center;transition:all 0.15s;color:#ccc}
.check-btn.done{background:#1d9e75;border-color:#1d9e75;color:#fff}
.check-btn:hover{border-color:#1d9e75}
.hint{font-size:11px;color:#aaa;margin-top:8px;padding:0 4px}

/* 側欄 */
.side-panel{width:280px;flex-shrink:0;background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:16px;display:none;position:sticky;top:80px}
.side-panel.open{display:block}
.side-name{font-size:16px;font-weight:600;margin-bottom:4px}
.side-num{font-size:12px;color:#aaa;margin-bottom:12px}
.side-label{font-size:11px;font-weight:500;color:#888;margin-bottom:6px;margin-top:14px}
.side-label:first-of-type{margin-top:0}
.side-note{width:100%;min-height:120px;padding:8px 10px;border:1px solid #eee;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a1a;resize:vertical;line-height:1.6}
.side-note:focus{outline:none;border-color:#bbb}
.side-save{width:100%;margin-top:10px;padding:8px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px}
.side-save:hover{opacity:0.85}
.side-close{float:right;background:none;border:none;cursor:pointer;color:#aaa;font-size:18px;line-height:1}
.side-close:hover{color:#333}
.urgent-row{display:flex;align-items:center;gap:8px;margin-top:10px}
.urgent-toggle{padding:6px 14px;border:1.5px solid #ddd;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;color:#888}
.urgent-toggle.on{border-color:#e24b4a;background:#fff0f0;color:#a32d2d;font-weight:500}

/* 頁面 */
.page{display:none}.page.active{display:block}
.visit-form{background:#fff;border-radius:12px;border:1px solid #e5e5e5;padding:20px;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:5px}
.field label{font-size:12px;color:#888;font-weight:500}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;font-family:inherit;color:#1a1a1a;background:#fff}
.field textarea{resize:vertical;min-height:70px}
.section-lbl{font-size:12px;font-weight:500;color:#888;margin-bottom:8px;margin-top:16px}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:4px}
.chip{padding:5px 12px;border-radius:20px;border:1px solid #ddd;font-size:12px;cursor:pointer;background:#fff;color:#333;user-select:none}
.chip:hover{border-color:#888}
.chip.on{background:#e1f5ee;border-color:#1d9e75;color:#085041}
.chip.on-warn{background:#faeeda;border-color:#ba7517;color:#633806}
.gen-btn{width:100%;padding:11px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;margin-top:14px}
.gen-btn:hover{opacity:0.85}
.result-box{background:#f8f8f8;border:1px solid #e5e5e5;border-radius:10px;padding:16px;font-size:13px;line-height:1.9;white-space:pre-wrap;margin-top:14px}
.copy-btn{margin-top:8px;padding:7px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#555}
.copy-btn:hover{background:#f0f0f0}
.record-card{background:#fff;border-radius:10px;border:1px solid #e5e5e5;padding:14px;margin-bottom:10px}
.record-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rtype{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:500}
.rtype-home{background:#e1f5ee;color:#085041}
.rtype-phone{background:#e6f1fb;color:#0c447c}
.rdate{font-size:12px;color:#888}
.rbody{font-size:13px;line-height:1.8}
.rdel{background:none;border:none;cursor:pointer;color:#ccc;font-size:12px;padding:2px 8px;border-radius:6px}
.rdel:hover{background:#fcebeb;color:#a32d2d}
.empty{text-align:center;padding:40px;color:#aaa;font-size:13px}
.case-selector{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.case-selector select{padding:7px 10px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff}
@media(max-width:700px){
  .side-panel{width:100%;position:static}
  .layout{flex-direction:column}
  .form-row,.form-row.three{grid-template-columns:1fr}
  table{min-width:unset}
  th,td{font-size:12px}
  .num-cell{width:28px;font-size:11px;padding:0 3px}
  .note-wrap{padding:0 3px;gap:2px}
  .urgent-btn{width:20px;height:20px;font-size:10px;flex-shrink:0}
  .note-input{font-size:12px;display:none}
  .name-cell{width:70px}
  .name-cell .cell-input{font-size:13px;font-weight:500}
  .check-cell{width:90px}
  .check-btn{width:28px;height:28px;font-size:13px}
  .visit-cell{width:44px}
  .cell-input{font-size:12px;height:44px}
  .del-cell{width:28px}
  .del-btn{font-size:13px}
  .progress-bar-wrap{padding:10px 14px}
  .sub-stats{gap:10px;font-size:11px}
  .toolbar{gap:6px}
  .search-box{width:120px;font-size:12px}
  .add-btn{font-size:12px;padding:6px 10px}
  .month-label{font-size:13px}
}
</style>
</head>
<body>
<div class="header">
  <h1>個案管理系統</h1>
  <button class="nav-btn active" onclick="showPage('list',this)">個案列表</button>
  <button class="nav-btn" onclick="showPage('visit',this)">家訪紀錄</button>
  <button class="nav-btn" onclick="showPage('history',this)">歷史紀錄</button>
</div>
<div class="container">

  <!-- 個案列表 -->
  <div class="page active" id="page-list">
    <div class="progress-bar-wrap">
      <div class="progress-top">
        <div class="progress-title">本月完成進度</div>
        <div class="progress-nums">完成 <span id="p-done">0</span> / <span id="p-total">0</span> 個案</div>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="p-bar" style="width:0%"></div></div>
      <div class="sub-stats">
        <div>電訪完成：<b id="s-phone">0</b> 筆</div>
        <div>家訪完成：<b id="s-home">0</b> 筆</div>
        <div>電訪勾選：<b id="s-phone-check">0</b> 筆</div><div>家訪勾選：<b id="s-home-check">0</b> 筆</div>
        <div>待處理：<b id="s-urgent" style="color:#e24b4a">0</b> 筆</div>
      </div>
    </div>
    <div class="toolbar">
      <div class="month-ctrl">
        <button onclick="changeMonth(-1)">&#8249;</button>
        <span class="month-label" id="month-label"></span>
        <button onclick="changeMonth(1)">&#8250;</button>
        <button onclick="goToday()" style="font-size:11px;padding:5px 8px">本月</button>
      </div>
      <input class="search-box" type="text" id="search" placeholder="搜尋姓名..." oninput="renderList()">
      <button class="add-btn" onclick="addCase()">＋ 新增個案</button>
    </div>
    <div class="layout">
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th class="center" style="width:40px">#</th>
            <th style="width:180px">備註</th>
            <th style="width:100px">姓名</th>
            <th class="center" style="width:130px">電訪完成 &nbsp; 家訪完成</th>
            <th class="center" style="width:66px">電訪</th>
            <th class="center" style="width:66px">家訪</th>
            <th style="width:36px"></th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
      <!-- 側欄 -->
      <div class="side-panel" id="side-panel">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <div>
            <div class="side-name" id="side-name"></div>
            <div class="side-num" id="side-num"></div>
          </div>
          <button class="side-close" onclick="closePanel()">×</button>
        </div>
        <div class="urgent-row">
          <button class="urgent-toggle" id="side-urgent-btn" onclick="toggleUrgentSide()">！待處理</button>
        </div>
        <div class="side-label">完整備註</div>
        <textarea class="side-note" id="side-note" placeholder="輸入備註內容..."></textarea>
        <button class="side-save" onclick="saveSideNote()">儲存備註</button>
        <div class="side-label" style="margin-top:16px">複評時間</div>
        <input type="text" id="side-review" placeholder="YYYY-MM-DD" style="width:100%;padding:7px 10px;border:1px solid #eee;border-radius:8px;font-size:13px;font-family:inherit">
        <button class="side-save" style="margin-top:8px;background:#555" onclick="saveSideReview()">儲存複評時間</button>
      </div>
    </div>
    <div class="hint">點姓名或編號開啟側欄查看完整備註。電訪／家訪欄輸入「1」自動變紅。家電訪完成欄點圓圈打勾。</div>
  </div>

  <!-- 家訪紀錄 -->
  <div class="page" id="page-visit">
    <div class="visit-form">
      <div class="form-row three">
        <div class="field"><label>選擇個案</label><select id="v-case"><option value="">-- 請選擇 --</option></select></div>
        <div class="field"><label>訪視日期</label><input type="date" id="v-date"></div>
        <div class="field"><label>類型</label><select id="v-type"><option value="home">家訪</option><option value="phone">電訪</option></select></div>
      </div>
      <div class="form-row">
        <div class="field"><label>負責社工</label><input id="v-worker" placeholder="姓名"></div>
      </div>
      <div class="section-lbl">活動能力</div><div class="chips" id="mob-chips"></div>
      <div class="section-lbl">居家環境</div><div class="chips" id="env-chips"></div>
      <div class="section-lbl">情緒與配合度</div><div class="chips" id="mood-chips"></div>
      <div class="section-lbl">目前使用服務</div><div class="chips" id="svc-chips"></div>
      <div class="section-lbl">風險評估</div><div class="chips" id="risk-chips"></div>
      <div class="field" style="margin-top:14px"><label>補充說明（選填）</label><textarea id="v-extra" placeholder="其他觀察或特殊狀況..."></textarea></div>
      <button class="gen-btn" onclick="generateRecord()">生成家訪紀錄</button>
      <div id="result-area"></div>
    </div>
  </div>

  <!-- 歷史紀錄 -->
  <div class="page" id="page-history">
    <div class="case-selector">
      <label style="font-size:13px;color:#888">篩選個案：</label>
      <select id="h-case" onchange="renderHistory()"><option value="">全部個案</option></select>
    </div>
    <div id="history-list"></div>
  </div>

</div>
<script>
const NAMES = ["楊王玲珠","李佳榮","李淑娟","蕭新喜","曹橋林","蕭濱星","高金玉","朱豪哲","李基顯","陳亭臻","李瑞仙","陳劉甚","陳葉月枝","林羅俊","張國基","柯春男","游照美","曾素敏","吳慧貞","張楊彩","楊美雲","莊武男","羅莉","林劍亭","黃士馨","黃江泉","陳吳寶","劉麗秀","江鄭脩","周美霞","邵代卿","劉春枝","許純真/郭天賜","郭天賜/許純真","曾木耳","余錦魚","李簡喜蓮","曾淑敏","郭錦秀","黃曹彩鑾","邱錦檉","盧景麟","賴石完","郭佳錦","陳許採雲","李佳倖","陳謂寬","謝桃枝","米張書香","柳鳳春","吳呂美珠","吳涂綺玲","賴藝仁","徐天一","劉椿隆","楊嘉芸","鍾雲秀","許兆年 (許黃阿雪)","陳陽明","林惠瑩 (黃仲雄)","林趙金枝","許黃阿雪(許兆年)","李香妹","許乃","陳碧蓮","劉金德 (王寶蓮)","王寶蓮 (劉金德)","周謝佩玲","陳寶珠","陳國翹","朱平啟媛","黃竹發","高陳麗","高清河","王張素珠","洪鄭詠雪 (洪焜城)","高瑞宏","趙容(林春富)","林春富(趙容)","張薫圭","莊玉梅","葉曾秀梅","林蔡正","劉坤堂","曾淑貞","卓林阿滿","李佳州","陳朝瑞","李青蓉","吳懿庭","楊義勝","林秀鳳","劉晋榮","賴良","邱蕭秀櫻","嚴陳秀枝","李呂美朋 (李暮榮)","李暮榮 (李呂美朋)","陳珪琪","黃種銓 (謝錦霜)","謝錦霜 (黃種銓)","李懷真","許碧霞","林黃靜宜","陳麗娟","李福生","林博昭","王金地","邱寶珠","林麗華","林廖香綢","粘少華","吳鳳玉","廖碧玉","林楊淑慧","洪焜城 (洪鄭詠雪)","譚福修","陳蔡淑媛","柯雪治","張莊秀香 (張添進)","張添進 (張莊秀香)","謝梅","劉怡孋","黃月桂","高順顯","華寶餘","陳簡郁蘭","林游澄澄","鄧筑源","劉勤","陳侯阿秀","陳水力","曹杰福","錢建嘉","廖雪珍","簡漢陽","黃秀美","富蒼生","周蔚任","謝王釋敏","陳俊昭","花雲源","張淼本","林禮中","馬元得","陳群品","紀昭行","連錦涁","林清緹","林蕙莞"];

const today = new Date();
let viewYear = today.getFullYear();
let viewMonth = today.getMonth()+1;
let selectedId = null;

let db = JSON.parse(localStorage.getItem('casetracker_v5')||'null');
if(!db){
  db={nid:NAMES.length+1,cases:NAMES.map((name,i)=>({id:i+1,note:'',urgent:false,name,review:'',phone_done:false,home_done:false})),visits:[],records:[]};
  localStorage.setItem('casetracker_v5',JSON.stringify(db));
}
function save(){localStorage.setItem('casetracker_v5',JSON.stringify(db))}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='list')renderList();
  if(name==='visit')initVisit();
  if(name==='history')initHistory();
}

function getVisit(caseId,y,m){return db.visits.find(v=>v.caseId===caseId&&v.year===y&&v.month===m)||{phone:'',home:''};}
function setVisit(caseId,y,m,field,val){
  let v=db.visits.find(v=>v.caseId===caseId&&v.year===y&&v.month===m);
  if(!v){v={caseId,year:y,month:m,phone:'',home:''};db.visits.push(v);}
  v[field]=val;save();
}

function renderList(){
  const y=viewYear,m=viewMonth;
  const q=(document.getElementById('search')||{}).value||'';
  document.getElementById('month-label').textContent=`${y}/${String(m).padStart(2,'0')}`;
  let total=0,phoneDone=0,homeDone=0,phoneCheck=0,homeCheck=0,urgent=0,anyDone=0;
  const filtered=db.cases.filter(c=>c.name.includes(q));
  const rows=filtered.map((c)=>{
    total++;
    const v=getVisit(c.id,y,m);
    const pd=v.phone==='1',hd=v.home==='1';
    if(pd)phoneDone++;
    if(hd)homeDone++;
    if(pd||hd)anyDone++;
    if(c.phone_done)phoneCheck++;if(c.home_done)homeCheck++;
    if(c.urgent)urgent++;
    const globalIdx=db.cases.indexOf(c)+1;
    const isSel=c.id===selectedId;
    return `<tr class="${isSel?'selected':''}">
      <td class="num-cell" onclick="openPanel(${c.id})">${globalIdx}</td>
      <td>
        <div class="note-wrap">
          <button class="urgent-btn ${c.urgent?'on':''}" onclick="toggleUrgent(${c.id},this)">!</button>
          <textarea class="note-input" onchange="updCase(${c.id},'note',this.value)" placeholder="備註...">${esc2(c.note)}</textarea>
        </div>
      </td>
      <td class="name-cell" onclick="openPanel(${c.id})"><input class="cell-input" value="${esc(c.name)}" onchange="updCase(${c.id},'name',this.value)" style="cursor:pointer"></td>
      <td class="check-cell" style="text-align:center"><button class="check-btn ${c.phone_done?'done':''}" onclick="togglePhoneDone(${c.id},this)" title="電訪完成">✓</button> <button class="check-btn ${c.home_done?'done':''}" onclick="toggleHomeDone(${c.id},this)" title="家訪完成" style="background:${c.home_done?'#1d9e75':'#fff'};border-color:${c.home_done?'#1d9e75':'#ddd'}">✓</button></td>
      <td class="${pd?'done-cell':''}"><input class="cell-input visit-input" value="${v.phone}" oninput="onVisit(${c.id},'phone',this)" placeholder=""></td>
      <td class="${hd?'done-cell':''}"><input class="cell-input visit-input" value="${v.home}" oninput="onVisit(${c.id},'home',this)" placeholder=""></td>
      <td><button class="del-btn" onclick="delCase(${c.id})">×</button></td>
    </tr>`;
  }).join('');
  document.getElementById('tbody').innerHTML=rows;
  document.getElementById('p-done').textContent=anyDone;
  document.getElementById('p-total').textContent=total;
  document.getElementById('p-bar').style.width=total>0?Math.round(anyDone/total*100)+'%':'0%';
  document.getElementById('s-phone').textContent=phoneDone;
  document.getElementById('s-home').textContent=homeDone;
  document.getElementById('s-phone-check').textContent=phoneCheck;document.getElementById('s-home-check').textContent=homeCheck;
  document.getElementById('s-urgent').textContent=urgent;
}

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function esc2(s){return(s||'').replace(/</g,'&lt;')}

function openPanel(id){
  selectedId=id;
  const c=db.cases.find(c=>c.id===id);
  const idx=db.cases.indexOf(c)+1;
  document.getElementById('side-panel').classList.add('open');
  document.getElementById('side-name').textContent=c.name;
  document.getElementById('side-num').textContent='個案編號 #'+idx;
  document.getElementById('side-note').value=c.note||'';
  document.getElementById('side-review').value=c.review||'';
  const ub=document.getElementById('side-urgent-btn');
  ub.className='urgent-toggle'+(c.urgent?' on':'');
  ub.textContent=c.urgent?'！待處理中（點擊取消）':'！標記待處理';
  renderList();
}
function closePanel(){
  selectedId=null;
  document.getElementById('side-panel').classList.remove('open');
  renderList();
}
function saveSideNote(){
  if(!selectedId)return;
  const val=document.getElementById('side-note').value;
  updCase(selectedId,'note',val);
  renderList();
  const btn=document.querySelector('.side-save');
  btn.textContent='已儲存 ✓';setTimeout(()=>btn.textContent='儲存備註',1500);
}
function saveSideReview(){
  if(!selectedId)return;
  const val=document.getElementById('side-review').value;
  updCase(selectedId,'review',val);
}
function toggleUrgentSide(){
  if(!selectedId)return;
  const c=db.cases.find(c=>c.id===selectedId);
  if(c){c.urgent=!c.urgent;save();}
  const btn=document.getElementById('side-urgent-btn');
  btn.className='urgent-toggle'+(c.urgent?' on':'');
  btn.textContent=c.urgent?'！待處理中（點擊取消）':'！標記待處理';
  renderList();
}
function toggleUrgent(id,btn){
  const c=db.cases.find(c=>c.id===id);
  if(c){c.urgent=!c.urgent;save();}
  btn.classList.toggle('on');
  renderList();
}
function togglePhoneDone(id,btn){
  const c=db.cases.find(c=>c.id===id);
  if(c){c.phone_done=!c.phone_done;save();}
  btn.classList.toggle('done');
  renderList();
}
function toggleHomeDone(id,btn){
  const c=db.cases.find(c=>c.id===id);
  if(c){c.home_done=!c.home_done;save();}
  btn.classList.toggle('done');
  renderList();
}
function onVisit(id,field,input){
  const val=input.value.trim();
  setVisit(id,viewYear,viewMonth,field,val);
  input.parentElement.className=val==='1'?'done-cell':'';
  renderList();
}
function updCase(id,field,val){
  const c=db.cases.find(c=>c.id===id);
  if(c){c[field]=val;save();}
}
function addCase(){
  const name=prompt('請輸入個案姓名：');
  if(!name||!name.trim())return;
  const total=db.cases.length;
  const pos=prompt(`插入位置：\n輸入要插在第幾號後面（1～${total}）\n留空白或輸入 0 = 加到最後面`);
  const newCase={id:db.nid++,note:'',urgent:false,name:name.trim(),review:'',phone_done:false,home_done:false};
  const idx=parseInt(pos);
  if(!pos||pos.trim()===''||idx<=0||isNaN(idx)){
    db.cases.push(newCase);
  } else {
    const insertAt=Math.min(idx,total);
    db.cases.splice(insertAt,0,newCase);
  }
  save();renderList();
}
function delCase(id){
  if(!confirm('確定刪除這個個案？'))return;
  db.cases=db.cases.filter(c=>c.id!==id);
  db.visits=db.visits.filter(v=>v.caseId!==id);
  db.records=db.records.filter(r=>r.caseId!==id);
  if(selectedId===id)closePanel();
  save();renderList();
}
function changeMonth(d){viewMonth+=d;if(viewMonth>12){viewMonth=1;viewYear++;}if(viewMonth<1){viewMonth=12;viewYear--;}renderList();}
function goToday(){viewYear=today.getFullYear();viewMonth=today.getMonth()+1;renderList();}

const OPTS={mob:['自行行走','需輔具','需他人協助','臥床','使用輪椅'],env:['環境整潔','環境雜亂','有跌倒風險','採光不足','無障礙設施不足','環境良好'],mood:['穩定','焦慮','憂鬱','配合度佳','抗拒服務','情緒激動'],svc:['居家服務','日照中心','送餐服務','交通接送','輔具借用','喘息服務','醫療陪同','急難救助'],risk:['無立即風險','跌倒風險','營養不良','社會孤立','照顧者壓力大','需緊急介入']};
function initVisit(){
  const sel=document.getElementById('v-case');
  sel.innerHTML='<option value="">-- 請選擇 --</option>'+db.cases.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  document.getElementById('v-date').value=today.toISOString().slice(0,10);
  Object.entries(OPTS).forEach(([key,arr])=>{
    const isRisk=key==='risk';
    document.getElementById(key+'-chips').innerHTML=arr.map(v=>`<span class="chip" onclick="this.classList.toggle('${isRisk?'on-warn':'on'}')">${v}</span>`).join('');
  });
  document.getElementById('result-area').innerHTML='';
}
function getChips(id,cls='on'){return[...document.querySelectorAll('#'+id+' .chip.'+cls)].map(c=>c.textContent);}
function generateRecord(){
  const cid=parseInt(document.getElementById('v-case').value);
  if(!cid){alert('請先選擇個案');return;}
  const c=db.cases.find(x=>x.id===cid);
  const date=document.getElementById('v-date').value;
  const type=document.getElementById('v-type').value;
  const worker=document.getElementById('v-worker').value||'社工';
  const mob=getChips('mob-chips'),env=getChips('env-chips'),mood=getChips('mood-chips'),svc=getChips('svc-chips'),risk=getChips('risk-chips','on-warn');
  const extra=document.getElementById('v-extra').value;
  const typeTxt=type==='home'?'家訪':'電訪';
  let text=`【${typeTxt}紀錄】\n日期：${date}　類型：${typeTxt}　負責社工：${worker}\n個案姓名：${c.name}\n\n`;
  if(mob.length)text+=`一、活動能力\n個案${mob.join('、')}。\n\n`;
  if(env.length)text+=`二、居家環境\n環境評估：${env.join('、')}。\n\n`;
  if(mood.length)text+=`三、情緒與配合度\n個案表現${mood.join('、')}。\n\n`;
  if(svc.length)text+=`四、服務使用情形\n目前使用：${svc.join('、')}，運作情況良好。\n\n`;
  if(risk.length)text+=`五、風險評估\n評估結果：${risk.join('、')}，需持續追蹤。\n\n`;
  if(extra)text+=`六、補充說明\n${extra}\n\n`;
  text+=`七、後續處理\n將持續追蹤個案狀況，下次訪視依排程進行。`;
  db.records.push({id:db.nid++,caseId:cid,caseName:c.name,date,type,worker,text});
  save();
  document.getElementById('result-area').innerHTML=`<div class="result-box">${text.replace(/\n/g,'<br>')}</div><button class="copy-btn" onclick="navigator.clipboard.writeText(\`${text.replace(/`/g,'\\`')}\`).then(()=>{this.textContent='已複製 ✓';setTimeout(()=>this.textContent='複製紀錄文字',1500)})">複製紀錄文字</button>`;
}
function initHistory(){
  const sel=document.getElementById('h-case');
  const cur=sel.value;
  sel.innerHTML='<option value="">全部個案</option>'+db.cases.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
  sel.value=cur;renderHistory();
}
function renderHistory(){
  const fid=parseInt(document.getElementById('h-case').value)||null;
  const recs=[...db.records].filter(r=>!fid||r.caseId===fid).sort((a,b)=>b.date.localeCompare(a.date));
  document.getElementById('history-list').innerHTML=recs.length?recs.map(r=>`
  <div class="record-card">
    <div class="record-top">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="rtype rtype-${r.type}">${r.type==='home'?'家訪':'電訪'}</span>
        <span class="rdate">${r.date}</span>
        <span style="font-weight:500">${r.caseName}</span>
        <span class="rdate">${r.worker||''}</span>
      </div>
      <button class="rdel" onclick="delRecord(${r.id})">刪除</button>
    </div>
    <div class="rbody">${r.text.replace(/\n/g,'<br>')}</div>
    <button class="copy-btn" style="margin-top:8px" onclick="navigator.clipboard.writeText(\`${r.text.replace(/`/g,'\\`')}\`).then(()=>{this.textContent='已複製 ✓';setTimeout(()=>this.textContent='複製',1500)})">複製</button>
  </div>`).join(''):'<div class="empty">尚無紀錄</div>';
}
function delRecord(id){
  if(!confirm('確定刪除這筆紀錄？'))return;
  db.records=db.records.filter(r=>r.id!==id);
  save();renderHistory();
}
renderList();
</script>
</body>
</html>
